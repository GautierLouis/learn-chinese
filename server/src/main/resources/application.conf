ktor {
  deployment {
    port = 8080
    port = ${?PORT}
    watch = [server]
    host = "0.0.0.0"
    # Shutdown gracefully
    shutdown.url = "/shutdown"
  }

  application {
    development = false
    watch = [ classes ]
    modules = [com.louisgautier.server.ApplicationKt.module]
  }
}

# Database config from env vars
database {
  host = "localhost"
  host = ${?DB_HOST}
  port = 5432
  port = ${?DB_PORT}
  name = "ktor_dev"
  name = ${?DB_NAME}
  user = "postgres"
  user = ${?DB_USER}
  password = "postgres"
  password = ${?DB_PASSWORD}
}

# Supabase config
supabase {
  url = ${?SUPABASE_URL}
  issuer = ${?SUPABASE_ISSUER}
  jwks = ${?SUPABASE_JWKS}
  audience = ${?SUPERBASE_AUDIENCE}
  jwtKey = ${?SUPABASE_JWT_KEY}
  publicKey = ${?SUPABASE_PUBLIC_KEY}
  privateKey = ${?SUPABASE_PRIVATE_KEY}

}

# Monitoring
monitoring {
  prometheus = ${?PROMETHEUS_ENDPOINT}
  grafana = ${?GRAFANA_ENDPOINT}
}

app {
  env = ${?ENV}
}
